apiVersion: apps/v1
kind: Deployment

metadata:
  name: django-app
  labels:
    app: django-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: django-app

  template:
    metadata:
      labels:
        app: django-app

    spec:
      containers:
      - name: django-app

        image: django-todo-app:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        env:

        - name: DJANGO_DEBUG
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: DJANGO_DEBUG

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: APP_ENV

        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: APP_NAME

        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: SECRET_KEY

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: DB_PASSWORD

---
apiVersion: v1
kind: Service

metadata:
  name: django-service

spec:
  selector:
    app: django-app

  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

  type: ClusterIP
